<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Puttingbana</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #cbd5e1;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;

      --green: #22c55e;
      --green-strong: #16a34a;
      --green-soft: #dcfce7;

      --red: #ef4444;
      --red-strong: #dc2626;
      --red-soft: #fee2e2;

      --yellow: #facc15;
      --yellow-strong: #eab308;
      --yellow-soft: #fef3c7;

      --blue: #2563eb;
      --blue-soft: #dbeafe;

      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;

      --shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    .topbar {
      margin-bottom: 14px;
    }

    .title {
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.35;
      margin-bottom: 14px;
    }

    .help {
      background: #eef5ff;
      border: 1px solid #bfd7ff;
      color: #1e3a8a;
      border-radius: 20px;
      padding: 12px 14px;
      line-height: 1.35;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .row {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }

    .btn {
      border: 2px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 18px;
      min-height: 56px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .tabs .btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-card .sub {
      color: var(--muted);
      font-size: 13px;
    }

    .section { display: none; }
    .section.active { display: block; }

    .field-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .field input {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 2px solid var(--line);
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }

    .hole-card {
      margin-bottom: 18px;
      transition: 0.2s ease;
    }

    .hole-card.hattrick {
      background: var(--yellow-soft);
      border: 3px solid var(--yellow-strong);
      box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.45);
    }

    .hole-card.bom {
      background: var(--red-soft);
      border: 3px solid var(--red-strong);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.35);
    }

    .hole-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .hole-title {
      font-size: 26px;
      font-weight: 800;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      border: 2px solid var(--line);
      background: #f1f5f9;
    }

    .badge.hattrick {
      background: #fff1b8;
      border-color: #eab308;
      color: #854d0e;
    }

    .badge.bom {
      background: #ffd6d6;
      border-color: #dc2626;
      color: #991b1b;
    }

    .putt-card {
      background: #f8fafc;
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .putt-card.hit {
      background: var(--green-soft);
      border-color: #86efac;
    }

    .putt-card.miss {
      background: var(--red-soft);
      border-color: #fca5a5;
    }

    .distance {
      text-align: center;
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .putt-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }

    .btn-hit,
    .btn-miss,
    .btn-reset {
      min-height: 60px;
      border-radius: 18px;
      font-size: 17px;
      font-weight: 800;
      border: 3px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .btn-hit {
      background: #ffffff;
      color: var(--green-strong);
      border-color: #86efac;
    }

    .btn-hit.active {
      background: var(--green);
      color: white;
      border-color: var(--green-strong);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .btn-miss {
      background: #ffffff;
      color: var(--red-strong);
      border-color: #fca5a5;
    }

    .btn-miss.active {
      background: var(--red);
      color: white;
      border-color: var(--red-strong);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18);
    }

    .btn-reset {
      width: 100%;
      min-height: 50px;
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--line);
    }

    .leaderboard-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .leaderboard-row.gold {
      background: #fffbeb;
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
    }

    .leaderboard-row.silver {
      background: #f8fafc;
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.12);
    }

    .leaderboard-row.bronze {
      background: #fff7ed;
      border-color: #b45309;
      box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.12);
    }

    .leaderboard-rank {
      font-weight: 800;
      min-width: 34px;
      font-size: 18px;
    }

    .leaderboard-rank.gold { color: var(--gold); }
    .leaderboard-rank.silver { color: var(--silver); }
    .leaderboard-rank.bronze { color: var(--bronze); }

    .leaderboard-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .leaderboard-score {
      font-size: 24px;
      font-weight: 800;
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-top: 18px;
    }

    @media (max-width: 760px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
      .field-grid { grid-template-columns: 1fr; }
      .title { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">Puttingbana</div>
      <div class="subtitle">18 hål, 54 puttar, HATTRICK, BOM och gemensam highscore.</div>
      <div class="help">
        Öppna i <strong>Safari</strong> och välj <strong>Dela → Lägg till på hemskärmen</strong> om du vill använda den som app på iPhone.
      </div>
    </div>

    <div class="row grid-3">
      <button class="btn primary" id="newRoundBtn">Ny runda</button>
      <button class="btn" id="clearRoundBtn">Rensa runda</button>
      <button class="btn" id="saveHighscoreBtn">Spara till gemensam highscore</button>
    </div>

    <div class="row tabs grid-3">
      <button class="btn active" data-tab="round">Runda</button>
      <button class="btn" data-tab="overview">Översikt</button>
      <button class="btn" data-tab="highscore">Highscore</button>
    </div>

    <div class="row grid-4" id="summaryCards"></div>

    <section class="section active" id="section-round">
      <div class="card" style="margin-bottom:16px;">
        <div class="field-grid">
          <div class="field">
            <label for="playerName">Namn</label>
            <input id="playerName" type="text" placeholder="Skriv namn">
          </div>
          <div class="field">
            <label for="playedAt">Datum</label>
            <input id="playedAt" type="date">
          </div>
        </div>
      </div>

      <div id="holesContainer"></div>
    </section>

    <section class="section" id="section-overview">
      <div class="card" id="overviewCard"></div>
    </section>

    <section class="section" id="section-highscore">
      <div class="card">
        <div style="font-size: 24px; font-weight: 800; margin-bottom: 4px;">Gemensam highscore</div>
        <div style="color: var(--muted); font-size: 14px;">Bästa resultat per spelare.</div>
        <div class="leaderboard-list" id="leaderboardList"></div>
      </div>
    </section>

    <div class="footer-note">
      Lokal spelstatus sparas i mobilen. Highscore sparas också online via Supabase.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const db = window.supabase.createClient(
      "https://izihmzhfnhqwtmuncdfj.supabase.co",
      "sb_publishable_LrVtDfk9SqNwWHQH7rQz2g_MNo_9HbY"
    );

    const STORAGE_KEY = "puttingbana_clean_v4";

    const HOLES = [
      [23, 14, 7],
      [16, 10, 6],
      [20, 15, 8],
      [17, 12, 5],
      [16, 11, 8],
      [15, 11, 8],
      [13, 10, 6],
      [12, 8, 7],
      [11, 8, 6],
      [11, 7, 5],
      [10, 7, 5],
      [15, 9, 6],
      [13, 9, 6],
      [12, 5, 7],
      [12, 9, 6],
      [12, 7, 8],
      [12, 9, 6],
      [14, 10, 6]
    ];

    function createNewState() {
      return {
        createdAt: new Date().toISOString(),
        playerName: "",
        playedAt: new Date().toISOString().slice(0, 10),
        holes: HOLES.map(distances => ({
          distances,
          results: [null, null, null]
        }))
      };
    }

    function createClearedStatePreserveMeta(currentState) {
      return {
        createdAt: currentState.createdAt || new Date().toISOString(),
        playerName: currentState.playerName || "",
        playedAt: currentState.playedAt || new Date().toISOString().slice(0, 10),
        holes: HOLES.map(distances => ({
          distances,
          results: [null, null, null]
        }))
      };
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createNewState();
      try {
        const parsed = JSON.parse(raw);
        return {
          playerName: parsed.playerName || "",
          playedAt: parsed.playedAt || new Date().toISOString().slice(0, 10),
          createdAt: parsed.createdAt || new Date().toISOString(),
          holes: Array.isArray(parsed.holes) ? parsed.holes : createNewState().holes
        };
      } catch {
        return createNewState();
      }
    }

    let state = loadState();
    let activeTab = "round";

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setResult(holeIndex, puttIndex, value) {
      state.holes[holeIndex].results[puttIndex] = value;
      saveState();
      renderAll();
    }

    function resetPutt(holeIndex, puttIndex) {
      state.holes[holeIndex].results[puttIndex] = null;
      saveState();
      renderAll();
    }

    function getStats() {
      let totalMade = 0;
      let totalAttempts = 0;
      let c1Made = 0;
      let c1Attempts = 0;
      let c2Made = 0;
      let c2Attempts = 0;
      let hattricks = 0;
      let bombs = 0;

      state.holes.forEach(hole => {
        const made = hole.results.filter(v => v === true).length;
        const missed = hole.results.filter(v => v === false).length;

        if (made === 3) hattricks++;
        if (missed === 3) bombs++;

        hole.results.forEach((res, index) => {
          if (res !== null) totalAttempts++;
          if (res === true) totalMade++;

          const distance = hole.distances[index];
          if (distance >= 5 && distance <= 10) {
            if (res !== null) c1Attempts++;
            if (res === true) c1Made++;
          }
          if (distance >= 11 && distance <= 23) {
            if (res !== null) c2Attempts++;
            if (res === true) c2Made++;
          }
        });
      });

      return {
        totalMade,
        totalAttempts,
        totalPercent: totalAttempts ? Math.round((totalMade / totalAttempts) * 100) : 0,
        c1Made,
        c1Attempts,
        c1Percent: c1Attempts ? Math.round((c1Made / c1Attempts) * 100) : 0,
        c2Made,
        c2Attempts,
        c2Percent: c2Attempts ? Math.round((c2Made / c2Attempts) * 100) : 0,
        hattricks,
        bombs
      };
    }

    function renderSummary() {
      const stats = getStats();
      const wrap = document.getElementById("summaryCards");
      wrap.innerHTML = `
        <div class="card summary-card">
          <div class="label">Satta</div>
          <div class="value">${stats.totalMade}/${stats.totalAttempts || 54}</div>
          <div class="sub">Alla puttar</div>
        </div>
        <div class="card summary-card">
          <div class="label">Träffprocent</div>
          <div class="value">${stats.totalPercent}%</div>
          <div class="sub">Aktiv runda</div>
        </div>
        <div class="card summary-card">
          <div class="label">C1</div>
          <div class="value">${stats.c1Made}/${stats.c1Attempts}</div>
          <div class="sub">${stats.c1Percent}%</div>
        </div>
        <div class="card summary-card">
          <div class="label">C2</div>
          <div class="value">${stats.c2Made}/${stats.c2Attempts}</div>
          <div class="sub">${stats.c2Percent}%</div>
        </div>
      `;
    }

    function renderHoles() {
      const wrap = document.getElementById("holesContainer");
      wrap.innerHTML = "";

      state.holes.forEach((hole, holeIndex) => {
        const made = hole.results.filter(v => v === true).length;
        const missed = hole.results.filter(v => v === false).length;

        const holeCard = document.createElement("div");
        holeCard.className = "card hole-card" +
          (made === 3 ? " hattrick" : "") +
          (missed === 3 ? " bom" : "");

        holeCard.innerHTML = `
          <div class="hole-header">
            <div class="hole-title">Hål ${holeIndex + 1}</div>
            <div class="badges">
              <div class="badge">${made}/3</div>
              ${made === 3 ? `<div class="badge hattrick">🏆 HATTRICK</div>` : ""}
              ${missed === 3 ? `<div class="badge bom">💥 BOM</div>` : ""}
            </div>
          </div>
        `;

        hole.distances.forEach((distance, puttIndex) => {
          const result = hole.results[puttIndex];
          const puttCard = document.createElement("div");
          puttCard.className = "putt-card" +
            (result === true ? " hit" : "") +
            (result === false ? " miss" : "");

          puttCard.innerHTML = `
            <div class="distance">${distance} m</div>
            <div class="putt-actions">
              <button class="btn-hit ${result === true ? "active" : ""}" data-hole="${holeIndex}" data-putt="${puttIndex}" data-value="hit">Träff</button>
              <button class="btn-miss ${result === false ? "active" : ""}" data-hole="${holeIndex}" data-putt="${puttIndex}" data-value="miss">Miss</button>
            </div>
            <button class="btn-reset" data-hole="${holeIndex}" data-putt="${puttIndex}" data-value="reset">Rensa</button>
          `;
          holeCard.appendChild(puttCard);
        });

        wrap.appendChild(holeCard);
      });

      wrap.querySelectorAll("button[data-hole]").forEach(btn => {
        btn.addEventListener("click", () => {
          const hole = Number(btn.dataset.hole);
          const putt = Number(btn.dataset.putt);
          const value = btn.dataset.value;

          if (value === "hit") setResult(hole, putt, true);
          if (value === "miss") setResult(hole, putt, false);
          if (value === "reset") resetPutt(hole, putt);
        });
      });
    }

    function renderOverview() {
      const stats = getStats();
      document.getElementById("overviewCard").innerHTML = `
        <div style="font-size:24px; font-weight:800; margin-bottom:12px;">Översikt</div>
        <div style="display:grid; gap:10px;">
          <div>Satta puttar: <strong>${stats.totalMade}</strong></div>
          <div>Försök: <strong>${stats.totalAttempts}</strong></div>
          <div>Träffprocent: <strong>${stats.totalPercent}%</strong></div>
          <div>C1: <strong>${stats.c1Made}/${stats.c1Attempts}</strong> (${stats.c1Percent}%)</div>
          <div>C2: <strong>${stats.c2Made}/${stats.c2Attempts}</strong> (${stats.c2Percent}%)</div>
          <div>HATTRICK: <strong>${stats.hattricks}</strong></div>
          <div>BOM: <strong>${stats.bombs}</strong></div>
        </div>
      `;
    }

    function getBestPerPlayer(rows) {
      const bestMap = new Map();

      rows.forEach((row) => {
        const player = (row.name || "Anonym").trim();
        const existing = bestMap.get(player);

        if (!existing) {
          bestMap.set(player, row);
          return;
        }

        if (row.score > existing.score) {
          bestMap.set(player, row);
          return;
        }

        if (row.score === existing.score) {
          const rowDate = new Date(row.created_at).getTime();
          const existingDate = new Date(existing.created_at).getTime();
          if (rowDate < existingDate) {
            bestMap.set(player, row);
          }
        }
      });

      return Array.from(bestMap.values()).sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return new Date(a.created_at) - new Date(b.created_at);
      });
    }

    async function loadLeaderboard() {
      const list = document.getElementById("leaderboardList");
      list.innerHTML = `<div style="color: var(--muted);">Laddar highscore...</div>`;

      const { data, error } = await db
        .from("scores")
        .select("id, score, created_at, name, played_at")
        .order("created_at", { ascending: true });

      if (error) {
        list.innerHTML = `<div style="color:#b91c1c;">Kunde inte ladda highscore: ${error.message}</div>`;
        return;
      }

      if (!data || !data.length) {
        list.innerHTML = `<div style="color: var(--muted);">Ingen highscore sparad ännu.</div>`;
        return;
      }

      const rows = getBestPerPlayer(data).slice(0, 20);

      list.innerHTML = "";
      rows.forEach((row, index) => {
        const player = row.name || "Anonym";
        const date = row.played_at || new Date(row.created_at).toLocaleDateString("sv-SE");

        const medalClass = index === 0 ? "gold" : index === 1 ? "silver" : index === 2 ? "bronze" : "";
        const medalEmoji = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `#${index + 1}`;

        const item = document.createElement("div");
        item.className = `leaderboard-row ${medalClass}`;
        item.innerHTML = `
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="leaderboard-rank ${medalClass}">${medalEmoji}</div>
            <div>
              <div style="font-weight:800;">${player}</div>
              <div class="leaderboard-meta">${date}</div>
            </div>
          </div>
          <div class="leaderboard-score">${row.score}</div>
        `;
        list.appendChild(item);
      });
    }

    async function saveCurrentScoreToHighscore() {
      const stats = getStats();
      const score = stats.totalMade;
      const name = (state.playerName || "").trim() || "Anonym";
      const played_at = state.playedAt || new Date().toISOString().slice(0, 10);

      const { error } = await db
        .from("scores")
        .insert([{ score, name, played_at }]);

      if (error) {
        alert("Fel när highscore skulle sparas: " + error.message);
        return;
      }

      alert("Highscore sparad!");
      loadLeaderboard();
    }

    function activateTab(tabName) {
      activeTab = tabName;

      document.querySelectorAll(".tabs .btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tabName);
      });

      document.querySelectorAll(".section").forEach(section => {
        section.classList.remove("active");
      });

      document.getElementById("section-" + tabName).classList.add("active");

      if (tabName === "highscore") {
        loadLeaderboard();
      }
    }

    function renderAll() {
      renderSummary();
      renderHoles();
      renderOverview();

      const playerNameInput = document.getElementById("playerName");
      const playedAtInput = document.getElementById("playedAt");

      if (playerNameInput) playerNameInput.value = state.playerName || "";
      if (playedAtInput) playedAtInput.value = state.playedAt || new Date().toISOString().slice(0, 10);
    }

    document.getElementById("newRoundBtn").addEventListener("click", () => {
      if (!confirm("Starta en ny runda? Detta nollställer även namn och datum.")) return;
      state = createNewState();
      saveState();
      renderAll();
    });

    document.getElementById("clearRoundBtn").addEventListener("click", () => {
      if (!confirm("Vill du rensa rundan? Namn och datum behålls.")) return;
      state = createClearedStatePreserveMeta(state);
      saveState();
      renderAll();
    });

    document.getElementById("saveHighscoreBtn").addEventListener("click", saveCurrentScoreToHighscore);

    document.querySelectorAll(".tabs .btn").forEach(btn => {
      btn.addEventListener("click", () => activateTab(btn.dataset.tab));
    });

    document.getElementById("playerName").addEventListener("input", (e) => {
      state.playerName = e.target.value;
      saveState();
    });

    document.getElementById("playedAt").addEventListener("input", (e) => {
      state.playedAt = e.target.value;
      saveState();
    });

    renderAll();
    loadLeaderboard();
  </script>
</body>
</html>
