<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Putting App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

.green { background: #4caf50; color: white; }
.red { background: #f44336; color: white; }

.card {
  padding: 15px;
  background: white;
  margin-bottom: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<h1>Putting</h1>

<div id="game"></div>

<h2>Highscore</h2>
<ul id="highscores"></ul>

<script>
const supabase = window.supabase.createClient(
  "https://izihmzhfnhqwtmuncdfj.supabase.co",
  "DIN_KEY_HÄR"
);

let score = 0;

function addShot(hit) {
  if(hit) score++;

  saveScore();
}

async function saveScore() {
  await supabase.from("scores").insert([
    { score: score }
  ]);

  loadScores();
}

async function loadScores() {
  let { data } = await supabase
    .from("scores")
    .select("*")
    .order("score", { ascending: false })
    .limit(10);

  let list = document.getElementById("highscores");
  list.innerHTML = "";

  data.forEach(row => {
    let li = document.createElement("li");
    li.textContent = row.score;
    list.appendChild(li);
  });
}

document.getElementById("game").innerHTML = `
  <div class="card">
    <button class="green" onclick="addShot(true)">Träff</button>
    <button class="red" onclick="addShot(false)">Miss</button>
  </div>
`;

loadScores();
</script>

</body>
</html>
