.button {
  transition: all 0.15s ease;
}

.button:active {
  transform: scale(0.95);
}

.hit-active {
  background: #16a34a !important;
  color: white;
  box-shadow: 0 0 10px rgba(22, 163, 74, 0.6);
}

.miss-active {
  background: #dc2626 !important;
  color: white;
  box-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
}
